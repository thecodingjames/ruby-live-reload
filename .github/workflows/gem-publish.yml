name: Publish Gem

on:
  push:
    branches: [ "main" ]

jobs:
  push:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      
    steps:
      # Set up
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version: '3.4'

      # Release
      - uses: rubygems/release-gem@v1
